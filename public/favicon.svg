<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Blue to Darker Blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F4C81" />
      <stop offset="100%" stop-color="#0A3660" />
    </linearGradient>
    
    <!-- Gold Gradient for the Building/Logo -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8941F" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#F3E5AB" />
    </linearGradient>

    <!-- Drop Shadow for the Logo Icon -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Card with rounded corners -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Elegant Gold Border (Subtle luxury frame) -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.3" />

  <!-- Logo Mark (Elegant modern skyscrapers/buildings) -->
  <g filter="url(#dropShadow)">
    <!-- Left Pillar (Vertical skyscraper) -->
    <rect x="150" y="220" width="60" height="160" rx="8" fill="url(#goldGrad)" />
    
    <!-- Middle Pillar (Taller skyscraper with sloped modern roof) -->
    <path d="M230,380 V150 c0,-4 2.5,-7.5 6,-9 l48,-16 c4.5,-1.5 9,2 9,6.5 v238.5 c0,5.5 -4.5,10 -10,10 h-48 c-2.5,0 -5,-2 -5,-4.5 Z" fill="url(#goldGrad)" opacity="0.95" />

    <!-- Right Pillar (Shorter villa/building shape with sloped roof) -->
    <path d="M315,380 V260 c0,-4 2,-7.5 5.5,-9.5 l42,-24 c4.5,-2.5 9.5,0.5 9.5,5.5 v138 c0,5.5 -4.5,10 -10,10 h-42.5 c-2.5,0 -4.5,-2 -4.5,-4.5 Z" fill="url(#goldGrad)" opacity="0.8" />
    
    <!-- Ground line -->
    <rect x="120" y="380" width="272" height="12" rx="6" fill="url(#goldGrad)" />

    <!-- Stylized arch linking the buildings (representing luxury, community, and shelter) -->
    <path d="M150,180 C150,110 210,110 256,130 C302,110 362,110 362,180" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" opacity="0.75" />

    <!-- Accent: Golden star sparkle representing premium real estate quality -->
    <path d="M300,90 L303,97 L310,98 L305,103 L306,110 L300,106 L294,110 L295,103 L290,98 L297,97 Z" fill="url(#goldGrad)" />
  </g>
</svg>